<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-color, #1a1a1a);
      color: #ffffff;
      transition: background 0.5s ease;
    }
    .card {
      text-align: center;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 14px;
      padding: 32px 40px;
      max-width: 90%; word-break: break-all;
    }
    .badge {
      display: inline-block;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
  </style>
</head>
<body id="body">

  <div class="card">
    <h1>This is the demo for source code modification</h1>
    <p>Date: 22/04/2026</p>
    <p>Signs: give slack a chance</p>
  </div>

</body>
</html>
