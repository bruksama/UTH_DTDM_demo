services:
  app-blue:
    # OpenClaw sẽ thay IMAGE_TAG thành SHA hoặc tag bản build mới nhất
    image: ${IMAGE_TAG:-ghcr.io/bruksama/uth_dtdm_demo:latest}
    container_name: app-blue
    restart: unless-stopped
    environment:
      - APP_COLOR=blue
      - APP_VERSION=${IMAGE_TAG:-dev}
    expose:
      - "80"
    networks:
      - app_net

  app-green:
    image: ${IMAGE_TAG:-ghcr.io/bruksama/uth_dtdm_demo:latest}
    container_name: app-green
    restart: unless-stopped
    environment:
      - APP_COLOR=green
      - APP_VERSION=${IMAGE_TAG:-dev}
    expose:
      - "80"
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    container_name: edge-nginx
    restart: unless-stopped
    depends_on:
      - app-blue
      - app-green
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
